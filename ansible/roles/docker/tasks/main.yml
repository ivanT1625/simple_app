---
- name: Обновить apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Установить зависимости для Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Добавить GPG ключ Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Добавить репозиторий Docker
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
    state: present
    filename: docker

- name: Установить Docker Engine
  apt:
    name: docker-ce
    state: present
    update_cache: yes

- name: Установить docker-compose
  get_url:
    url: https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)
    dest: /usr/local/bin/docker-compose
    mode: '0755'

- name: Включить и запустить Docker daemon
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Добавить пользователя в группу docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
