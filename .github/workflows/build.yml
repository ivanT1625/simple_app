name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Bash scripts
        run: shellcheck scripts/*.sh || exit 1

      - name: Run tests
        run: pytest -v

      - name: Build Docker image
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "Error: Dockerfile not found in repository root"
            exit 1
          fi
          docker build -t my-app .

      - name: Run container and test health
        run: |
          # Очистка: удаляем старый контейнер, если он есть
          docker rm -f my-app-container || true
          # Запускаем новый контейнер
          docker run -d -p 5000:5000 --name my-app-container my-app
          sleep 10
          # Проверяем health-endpoint
          if curl --retry 5 --retry-delay 2 --retry-max-time 30 -f http://localhost:5000/health; then
            echo "Health check passed"
          else
            echo "Health check failed. Container logs:"
            docker logs my-app-container
            exit 1
          fi
          # Останавливаем и удаляем контейнер
          docker stop my-app-container
          docker rm my-app-container
